<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DiffInsight Printer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="printer" id="printer">

    <div class="printer-header">
      <h1>DiffInsight</h1>
      <p>Upload a Git diff and print a clean code review</p>
    </div>

    <div class="controls">
      <input type="file" id="diffFile" accept=".txt,.diff">
      <select id="mode">
        <option value="senior">Senior</option>
        <option value="junior">Junior</option>
      </select>
      <button id="printBtn" onclick="printAnalysis()">Print</button>
    </div>

    <!-- LED PANEL -->
    <div class="led-panel">
      <span class="led red" id="led-high"></span>
      <span class="led yellow" id="led-medium"></span>
      <span class="led green" id="led-low"></span>
    </div>

    <div class="status" id="statusText">
      Ready.
    </div>

    <!-- SLOT -->
    <div class="printer-slot"></div>

    <!-- RECEIPT -->
    <div class="receipt-wrapper">
      <pre id="analysis-output" class="analysis-output"></pre>
    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
